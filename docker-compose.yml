version: '3.8'

services:
  # ─── PostgreSQL Database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: git_guardian
      POSTGRES_PASSWORD: git_guardian
      POSTGRES_DB: git_guardian
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U git_guardian"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Git Guardian API ─────────────────────────────────────────────
  git_guardian-api:
    build: .
    network_mode: "host"
    volumes:
      - .:/app
      - chroma_data:/app/chroma_data
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - DATABASE_URL=postgresql+psycopg2://git_guardian:git_guardian@localhost:5432/git_guardian
      - DATABASE_URL_ASYNC=postgresql+asyncpg://git_guardian:git_guardian@localhost:5432/git_guardian
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Streamlit Dashboard ──────────────────────────────────────────
  dashboard:
    build: .
    network_mode: "host"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+psycopg2://git_guardian:git_guardian@localhost:5432/git_guardian
    command: ["streamlit", "run", "app/dashboard/app.py", "--server.port", "8501", "--server.headless", "true"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  chroma_data:
